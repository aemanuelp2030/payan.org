<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PAYAN WAR BOARD</title>
<meta property="og:title" content="PAYAN WAR BOARD">
<meta property="og:description" content="Crums until $1B. Force it.">
<meta property="og:image" content="https://payan.org/payan-logo.png">
<meta property="og:url" content="https://payan.org/scoreboard.html">
<meta property="og:type" content="website">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: Chicago, Geneva, Monaco, "Courier New", monospace;
    font-size: 15px;
  }
  .wrap {
    padding: 20px;
  }
  .title {
    margin-bottom: 14px;
    font-weight: normal;
    letter-spacing: .5px;
  }
  .title a {
    color: #fff;
    text-decoration: none;
  }
  .metrics {
    line-height: 1.5;
    max-width: 400px;
    margin-bottom: 16px;
  }
  .label {
    display: inline-block;
    width: 140px;
    color: #fff;
  }
  .val {
    color: #fff;
    font-weight: bold;
  }
  .tier {
    margin-top: 8px;
    color: #4CBB17;
  }
  .timers {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    gap: 60px;
    max-width: 620px;
  }
  .timer {
    line-height: 1.5;
    min-width: 260px;
  }
  .timer-heading {
    margin-bottom: 4px;
    font-weight: normal;
    letter-spacing: .3px;
  }
  .wasted .val {
    color: #EE4B2B;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">
    Emanuel Payan |
    <a href="/">Home</a> |
    <a href="decade.html">Decade</a> |
    <a href="burn.html">Burn</a> |
    <a href="scoreboard.html">Scoreboard</a>
  </div>

  <div class="metrics">
    <div class="timer-heading">BOARD</div>
    <div><span class="label">CARS SOLD MTD</span>: <span class="val" id="cars-mtd">9</span></div>
    <div><span class="label">AVG GROSS /UNIT</span>: <span class="val" id="gross-unit">$4<780</span></div>
    <div><span class="label">MTD GROSS $</span>: <span class="val" id="gross-mtd">$43<020</span></div>
    <div class="tier"><span class="label">COMMISSION TIER (12 units)</span>: 12%</div>
  </div>

  <div class="timers">
    <div class="timer wasted">
      <div class="timer-heading">TIME WASTED THIS MONTH</div>
      <div><span class="label">DAYS</span>: <span class="val" id="wd">0</span></div>
      <div><span class="label">HOURS</span>: <span class="val" id="wh">0</span></div>
      <div><span class="label">MINUTES</span>: <span class="val" id="wmi">0</span></div>
      <div><span class="label">SECONDS</span>: <span class="val" id="ws">0</span></div>
    </div>

    <div class="timer">
      <div class="timer-heading">TIME LEFT THIS MONTH</div>
      <div><span class="label">DAYS</span>: <span class="val" id="md">0</span></div>
      <div><span class="label">HOURS</span>: <span class="val" id="mh">0</span></div>
      <div><span class="label">MINUTES</span>: <span class="val" id="mmi">0</span></div>
      <div><span class="label">SECONDS</span>: <span class="val" id="ms">0</span></div>
    </div>
  </div>
</div>

<script>
// TIME LEFT
function updateTimeLeft() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const endOfMonth = new Date(year, month + 1, 0, 23, 59, 59, 999);
  const diff = endOfMonth - now;
  if (diff <= 0) {
    document.getElementById('md').textContent = '0';
    document.getElementById('mh').textContent = '0';
    document.getElementById('mmi').textContent = '0';
    document.getElementById('ms').textContent = '0';
    return;
  }
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  document.getElementById('md').textContent = days;
  document.getElementById('mh').textContent = hours;
  document.getElementById('mmi').textContent = minutes;
  document.getElementById('ms').textContent = seconds;
}

// TIME WASTED
function updateTimeWasted() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const startOfMonth = new Date(year, month, 1, 0, 0, 0, 0);
  const diff = now - startOfMonth;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  document.getElementById('wd').textContent = days;
  document.getElementById('wh').textContent = hours;
  document.getElementById('wmi').textContent = minutes;
  document.getElementById('ws').textContent = seconds;
}

function updateTimers() {
  updateTimeLeft();
  updateTimeWasted();
}

updateTimers();
setInterval(updateTimers, 1000);
</script>
</body>
</html>
