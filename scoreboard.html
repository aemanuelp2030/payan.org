<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PAYAN WAR BOARD</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 900px;
    }
    h1 {
      font-size: 5rem;
      margin: 0 0 20px;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ff0044, #ff9900);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 1.8rem;
      color: #ff0044;
      margin-bottom: 60px;
      font-weight: bold;
    }
    .scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 40px;
    }
    .card {
      background: #111;
      border: 3px solid #ff0044;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 0 30px rgba(255,0,68,0.3);
    }
    .label {
      font-size: 1.4rem;
      color: #aaa;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .value {
      font-size: 5.5rem;
      font-weight: 900;
      color: #fff;
      margin: 0;
      line-height: 1;
    }
    .gross-unit {
      font-size: 4rem;
      color: #ff9900;
    }
    .gross-mtd {
      font-size: 4.5rem;
      color: #00ff9d;
    }
    .tier {
      font-size: 2.2rem;
      color: #ff0044;
      margin-top: 12px;
      font-weight: bold;
    }
    footer {
      margin-top: 100px;
      font-size: 1.2rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PAYAN WAR BOARD</h1>
    <div class="subtitle">CRUMBS UNTIL $1B. BEND REALITY. FORCE IT.</div>

    <div class="scoreboard">
      <div class="card">
        <div class="label">CARS SOLD MTD</div>
        <div class="value" id="cars-mtd">0</div>
      </div>

      <div class="card">
        <div class="label">AVG GROSS PROFIT/UNIT</div>
        <div class="value gross-unit" id="gross-unit">$0</div>
        <div class="tier">COMMISSION TIER: 25-35%</div>
      </div>

      <div class="card">
        <div class="label">MTD GROSS $ GENERATED</div>
        <div class="value gross-mtd" id="gross-mtd">$0</div>
      </div>
    </div>

    <footer>Galpin Ford Domination | Emanuel Payan | Updated: March 15, 2026</footer>
  </div>

  <script>
    // Hardcode your real numbers here when ready - then commit/push
    // document.getElementById('cars-mtd').textContent = '47';
    // document.getElementById('gross-unit').textContent = '$4,812';
    // document.getElementById('gross-mtd').textContent = '$226,164';
  </script>
</body>
</html>
